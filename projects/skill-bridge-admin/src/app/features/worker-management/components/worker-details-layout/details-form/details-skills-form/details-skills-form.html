<div class="form-layout-skill">
    <div class="wrapper-form">
        <div class="header-skills">

            <div class="form-header">
                <span>Worker Skills</span>
            </div>

        </div>

        <!-- SKILLS -->

        <div class="skills-container">
            @for(category of categoryControls; track $index; let categoryIndex = $index) {

            <div class="category-card" [formGroup]="category">
                <div class="category-top">
                    <div class="category-header">
                        <h4>
                            Category #{{ category.get('categoryName')?.value }}
                        </h4>
                    </div>

                    <button class="btn-secondary btn-blue" (click)="addSkill(categoryIndex)">
                        <span class="icon-mask icon-sm icon-plus color-white "></span> Add Skills
                    </button>
                </div>

                <div formArrayName="skills">

                    @for(skill of getSkillControls(categoryIndex); track $index; let skillIndex = $index) {

                    <div class="skill-card" [formGroup]="skill">

                        <div class="skill-card-header">

                            <div class="skill-index">
                                Skill #{{ skillIndex + 1 }}
                            </div>

                            <button class="btn-table-action badge-red" (click)="removeSkill(categoryIndex, skillIndex)">
                                Delete </button>
                        </div>
                        <div class="form-grid">
                            <div>
                                <mat-form-field appearance="outline">
                                    <input matInput formControlName="skillName" />
                                </mat-form-field>
                            </div>

                            <div>
                                <label class="field-label">
                                    Verified
                                </label>

                                <mat-checkbox formControlName="isVerified">
                                </mat-checkbox>
                            </div>
                        </div>
                    </div>
                    }
                </div>
            </div>
            }
        </div>
    </div>
</div>
