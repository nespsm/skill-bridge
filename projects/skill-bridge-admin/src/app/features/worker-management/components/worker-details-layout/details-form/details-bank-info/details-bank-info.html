<div class="form-layout-skill">

    <div class="wrapper-form">

        <div class="form-header">
            <span>Bank Details</span>
        </div>

        <form [formGroup]="workerBankDetailsFG"
              class="mat-elevation-z8 pt-sm">

            <div class="form-grid">

                <div>
                    <label class="field-label">
                        Bank Name
                    </label>

                    <mat-form-field class="gap-md" appearance="outline">
                        <input matInput formControlName="bankName" />
                    </mat-form-field>
                </div>

                <div>
                    <label class="field-label">
                        Account Holder Name
                    </label>

                    <mat-form-field class="gap-md" appearance="outline">
                        <input matInput formControlName="accountHolderName" />
                    </mat-form-field>
                </div>

                <div>
                    <label class="field-label">
                        Account Number
                    </label>

                    <mat-form-field class="gap-md" appearance="outline">
                        <input matInput formControlName="accountNumber" />
                    </mat-form-field>
                </div>

                <div>
                    <label class="field-label">
                        IFSC Code
                    </label>

                    <mat-form-field class="gap-md" appearance="outline">
                        <input matInput formControlName="ifscCode" />
                    </mat-form-field>
                </div>

            </div>

        </form>

    </div>

</div>
