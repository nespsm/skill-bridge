<!-- Navigation Links -->
<nav class="nav-links">
    @for (item of filteredNavItems; track $index) {
    <a [routerLink]="item.link" routerLinkActive="active"
        [routerLinkActiveOptions]="{
        paths: 'exact',
        queryParams: 'ignored',
        fragment: 'ignored',
        matrixParams: 'ignored'
    }" [queryParams]="item.queryParams">

        {{ item.name }}
    </a>
    }
</nav>
