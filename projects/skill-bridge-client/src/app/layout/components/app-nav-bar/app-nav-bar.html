<!-- Navigation Links -->
<nav class="nav-links">
    @for (item of filteredNavItems; track $index) {
    <a class="application d-flex rounded-0" [routerLink]="item.link" routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }" tabindex="0">
        {{ item.name }}
    </a>
    }
</nav>
